version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm install
    build:
      commands:
        - echo "Building Next.js application..."
        - npm run build
    postBuild:
      commands:
        - echo "Build completed successfully"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'
      - '.next/cache/**/*'
      - '.npm/**/*'
  envs:
    NEXT_PUBLIC_SUPABASE_URL:
      stackOutput: SupabaseUrl
    NEXT_PUBLIC_SUPABASE_ANON_KEY:
      stackOutput: SupabaseAnonKey
