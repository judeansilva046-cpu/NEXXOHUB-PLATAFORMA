name: Deploy Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'middleware.ts'
      - 'package.json'
      - 'tsconfig.json'
      - 'next.config.js'
      - '.env.example'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Pre-Deploy Validation

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm run test -- --run

      - name: Build for deployment
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-build-placeholder' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}

      - name: Verify build integrity
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed!"
            exit 1
          fi
          # Check for required files
          test -f ".next/BUILD_ID" || exit 1

  staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          environment: staging
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Wait for deployment
        run: sleep 30

      - name: Smoke tests on staging
        run: |
          echo "Running smoke tests on staging..."
          curl -f https://staging.nexxohub.com/api/health || exit 1
          echo "✅ Staging deployment healthy!"

      - name: Slack notification - Staging
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          channel: '#deployments'

  production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Deploy to Vercel (Production)
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}
          environment: production
          scope: ${{ secrets.VERCEL_ORG_ID }}
          prod: true

      - name: Wait for deployment
        run: sleep 30

      - name: Smoke tests on production
        run: |
          echo "Running smoke tests on production..."
          curl -f https://app.nexxohub.com/api/health || exit 1
          echo "✅ Production deployment healthy!"

      - name: Health check
        run: |
          # Check database connectivity
          # Check auth system
          # Check API endpoints
          echo "✅ All health checks passed!"

      - name: Update deployment status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              target_url: 'https://app.nexxohub.com',
              environment_url: 'https://app.nexxohub.com',
            });

      - name: Slack notification - Production
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          channel: '#deployments'
          mention: '@here'

      - name: Create release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: |
            Production deployment successful!
            Commit: ${{ github.sha }}
            Build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          draft: false
          prerelease: false

  rollback:
    runs-on: ubuntu-latest
    name: Rollback (Manual)
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Notify team of failure
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: '❌ Production deployment FAILED - Rollback may be needed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          channel: '#alerts'
          mention: '@here'

      - name: Create incident issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Production Deployment Failure',
              body: `Deployment failed at ${new Date().toISOString()}\nBuild: ${context.server_url}/${context.repository}/actions/runs/${context.runId}`,
              labels: ['incident', 'production'],
              assignees: ['@team-lead'],
            });
